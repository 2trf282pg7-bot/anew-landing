<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anew — Page Not Found</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --warm-white: #FAF6F1; --clay: #B8704E; --clay-dark: #8C4E32;
    --charcoal: #1C1614; --charcoal-soft: #5C4D45; --stone: #8A7870;
  }
  html, body { min-height: 100dvh; font-family: 'DM Sans', sans-serif; background: var(--warm-white); color: var(--charcoal); }
  .wrap { min-height: 100dvh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px 24px; text-align: center; }
  .logo { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 400; letter-spacing: 0.1em; color: var(--charcoal); margin-bottom: 48px; }
  .code { font-family: 'Cormorant Garamond', serif; font-size: 80px; font-weight: 300; color: var(--charcoal); line-height: 1; margin-bottom: 16px; }
  .title { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 300; color: var(--charcoal); margin-bottom: 12px; }
  .sub { font-size: 15px; color: var(--charcoal-soft); line-height: 1.6; margin-bottom: 40px; max-width: 360px; }
  .btn { display: inline-block; background: var(--clay); color: white; font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.12em; padding: 16px 32px; border-radius: 6px; text-decoration: none; transition: background 0.2s ease; }
  .btn:hover { background: var(--clay-dark); }
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">Anew</div>
  <div class="code">404</div>
  <div class="title">This page doesn't exist.</div>
  <p class="sub">The page you're looking for may have moved or no longer exists.</p>
  <a href="/" class="btn">Go home</a>
</div>
</body>
</html>
