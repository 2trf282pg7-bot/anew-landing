<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anew — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --warm-white: #FAF6F1;
    --clay: #B8704E;
    --clay-light: #D4906E;
    --clay-dark: #8C4E32;
    --charcoal: #1C1614;
    --charcoal-soft: #5C4D45;
    --stone: #8A7870;
    --blush: #EDD4C6;
    --blush-deep: #DBBAA6;
    --section-alt: #F5EFE8;
    --sage: #5E8A60;
  }

  html, body {
    min-height: 100dvh;
    font-family: 'DM Sans', sans-serif;
    background: var(--warm-white);
    color: var(--charcoal);
  }

  .auth-wrap {
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 24px 48px;
  }

  .auth-logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    font-weight: 400;
    letter-spacing: 0.1em;
    color: var(--charcoal);
    margin-bottom: 40px;
  }

  .auth-card {
    background: white;
    border-radius: 16px;
    padding: 36px 32px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 8px 40px rgba(28,22,20,0.08);
  }

  /* Tabs */
  .auth-tabs {
    display: flex;
    border-bottom: 1px solid var(--blush-deep);
    margin-bottom: 28px;
    gap: 0;
  }

  .auth-tab {
    flex: 1;
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    padding: 10px 0 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--stone);
    cursor: pointer;
    transition: color 0.2s ease, border-color 0.2s ease;
  }

  .auth-tab.active {
    color: var(--charcoal);
    border-bottom-color: var(--clay);
  }

  /* Panels */
  .auth-panel { display: none; }
  .auth-panel.active { display: block; }

  /* Form elements */
  .form-group { margin-bottom: 16px; }

  .form-label {
    display: block;
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--stone);
    margin-bottom: 6px;
  }

  .form-input {
    width: 100%;
    border: 1.5px solid var(--blush-deep);
    border-radius: 8px;
    padding: 12px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    color: var(--charcoal);
    background: white;
    outline: none;
    transition: border-color 0.2s ease;
    min-height: 48px;
  }

  .form-input:focus { border-color: var(--clay); }
  .form-input::placeholder { color: var(--stone); }

  /* Password toggle wrapper */
  .pw-wrap { position: relative; }
  .pw-wrap .form-input { padding-right: 44px; }
  .pw-toggle {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    color: var(--stone);
    font-size: 16px;
    padding: 0;
    line-height: 1;
    transition: color 0.2s ease;
  }
  .pw-toggle:hover { color: var(--charcoal-soft); }

  .btn-auth {
    width: 100%;
    background: var(--clay);
    color: white;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    padding: 16px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    transition: background 0.2s ease;
    min-height: 52px;
    margin-top: 8px;
  }

  .btn-auth:hover { background: var(--clay-dark); }
  .btn-auth:disabled { background: var(--blush-deep); cursor: not-allowed; }

  .form-link {
    display: block;
    text-align: right;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    color: var(--stone);
    text-decoration: underline;
    text-underline-offset: 3px;
    background: none;
    border: none;
    cursor: pointer;
    padding: 0;
    margin-top: 4px;
  }

  .form-link:hover { color: var(--charcoal-soft); }

  .form-error {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: var(--clay);
    margin-top: 12px;
    padding: 10px 12px;
    background: rgba(184,112,78,0.08);
    border-radius: 6px;
    display: none;
  }

  .form-error.show { display: block; }

  .form-success {
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--sage);
    margin-top: 12px;
    padding: 12px;
    background: rgba(94,138,96,0.08);
    border-radius: 6px;
    line-height: 1.5;
    display: none;
  }

  .form-success.show { display: block; }

  /* Email confirmation state */
  .confirm-state { text-align: center; padding: 8px 0; }
  .confirm-icon { font-size: 40px; margin-bottom: 16px; }

  .confirm-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 24px;
    font-weight: 400;
    color: var(--charcoal);
    margin-bottom: 12px;
  }

  .confirm-text {
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--charcoal-soft);
    line-height: 1.6;
  }

  /* Disclaimer */
  .auth-disclaimer { margin-top: 24px; text-align: center; max-width: 420px; }

  .auth-disclaimer p {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    color: var(--stone);
    line-height: 1.6;
    margin-bottom: 8px;
  }

  .auth-disclaimer-links { display: flex; justify-content: center; gap: 16px; }

  .auth-disclaimer-links a {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    color: var(--stone);
    text-decoration: underline;
    text-underline-offset: 2px;
  }

  .auth-disclaimer-links a:hover { color: var(--charcoal-soft); }

  @media (max-width: 480px) {
    .auth-card { padding: 28px 20px; }
  }
</style>
</head>
<body>

<div class="auth-wrap">
  <div class="auth-logo">Anew</div>

  <div class="auth-card" id="authCard">
    <!-- Tabs -->
    <div class="auth-tabs">
      <button class="auth-tab active" id="tabLogin" onclick="switchTab('login')">Log in</button>
      <button class="auth-tab" id="tabRegister" onclick="switchTab('register')">Sign up</button>
    </div>

    <!-- Login panel -->
    <div class="auth-panel active" id="panelLogin">
      <div class="form-group">
        <label class="form-label" for="loginEmail">Email address</label>
        <input class="form-input" type="email" id="loginEmail" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label" for="loginPassword">Password</label>
        <div class="pw-wrap">
          <input class="form-input" type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password">
          <button type="button" class="pw-toggle" onclick="togglePassword('loginPassword')" tabindex="-1">👁</button>
        </div>
        <button class="form-link" onclick="switchTab('reset')">Forgot your password?</button>
      </div>
      <button class="btn-auth" id="loginBtn" onclick="handleLogin()" disabled>Loading...</button>
      <div class="form-error" id="loginError"></div>
    </div>

    <!-- Register panel -->
    <div class="auth-panel" id="panelRegister">
      <div id="regFormFields">
        <div class="form-group">
          <label class="form-label" for="regEmail">Email address</label>
          <input class="form-input" type="email" id="regEmail" placeholder="you@example.com" autocomplete="email">
        </div>
        <div class="form-group">
          <label class="form-label" for="regPassword">Password (8+ characters)</label>
          <div class="pw-wrap">
            <input class="form-input" type="password" id="regPassword" placeholder="••••••••" autocomplete="new-password">
            <button type="button" class="pw-toggle" onclick="togglePassword('regPassword')" tabindex="-1">👁</button>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="regConfirm">Confirm password</label>
          <div class="pw-wrap">
            <input class="form-input" type="password" id="regConfirm" placeholder="••••••••" autocomplete="new-password">
            <button type="button" class="pw-toggle" onclick="togglePassword('regConfirm')" tabindex="-1">👁</button>
          </div>
        </div>
        <button class="btn-auth" id="registerBtn" onclick="handleRegister()" disabled>Loading...</button>
        <div class="form-error" id="registerError"></div>
      </div>

      <!-- Email sent confirmation (hidden initially) -->
      <div id="confirmState" style="display:none;" class="confirm-state">
        <div class="confirm-icon">✉️</div>
        <div class="confirm-title">Check your inbox</div>
        <p class="confirm-text">Click the link in the email we sent you to activate your account.</p>
      </div>
    </div>

    <!-- Password reset panel -->
    <div class="auth-panel" id="panelReset">
      <div class="form-group">
        <label class="form-label" for="resetEmail">Email address</label>
        <input class="form-input" type="email" id="resetEmail" placeholder="you@example.com" autocomplete="email">
      </div>
      <button class="btn-auth" id="resetBtn" onclick="handleReset()" disabled>Loading...</button>
      <div class="form-error" id="resetError"></div>
      <div class="form-success" id="resetSuccess">Check your email — we've sent a password reset link.</div>
      <button class="form-link" style="text-align:center;margin-top:16px;display:block;" onclick="switchTab('login')">Back to log in</button>
    </div>
  </div>

  <div class="auth-disclaimer">
    <p>Anew is not a substitute for professional therapy or medical advice.</p>
    <div class="auth-disclaimer-links">
      <a href="/terms.html">Terms of Service</a>
      <a href="/privacy.html">Privacy Policy</a>
    </div>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://hzkkftsihitkvdinydju.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh6a2tmdHNpaGl0a3ZkaW55ZGp1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNzUyODksImV4cCI6MjA5MDg1MTI4OX0.D7QBobLt7JhMGJcNNhvlLvKjq2ysozYa2k9Z0Fj8ZGI';
  let sbClient = null;

  function enableAuthButtons() {
    const labels = { loginBtn: 'Log in', registerBtn: 'Create account', resetBtn: 'Send reset email' };
    Object.entries(labels).forEach(([id, label]) => {
      const btn = document.getElementById(id);
      if (btn) { btn.disabled = false; btn.textContent = label; }
    });
  }

  function showInitError() {
    ['loginError', 'registerError', 'resetError'].forEach(id => {
      showError(id, 'Connection error. Please refresh the page.');
    });
  }

  async function initSupabase() {
    try {
      console.log('[Anew] initSupabase start');
      sbClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      // Check existing session — redirect if already logged in
      const { data: { session } } = await sbClient.auth.getSession();
      if (session) {
        console.log('[Anew] existing session found, redirecting');
        await redirectByStatus(session);
        return;
      }

      // Listen for auth changes (e.g. email confirmation callback)
      sbClient.auth.onAuthStateChange(async (event, session) => {
        if (event === 'SIGNED_IN' && session) {
          await redirectByStatus(session);
        }
      });

      console.log('[Anew] init complete, enabling buttons');
      enableAuthButtons();
    } catch (e) {
      console.error('[Anew] initSupabase error:', e);
      showInitError();
    }
  }

  async function redirectByStatus(session) {
    try {
      const { data } = await sbClient
        .from('users')
        .select('subscription_status')
        .eq('id', session.user.id)
        .single();

      const status = data?.subscription_status;
      if (status === 'trial' || status === 'active') {
        window.location.href = '/dashboard.html';
      } else {
        window.location.href = '/onboarding.html';
      }
    } catch (_) {
      window.location.href = '/onboarding.html';
    }
  }

  function switchTab(tab) {
    ['login', 'register', 'reset'].forEach(t => {
      document.getElementById('tab' + t.charAt(0).toUpperCase() + t.slice(1))?.classList.remove('active');
      document.getElementById('panel' + t.charAt(0).toUpperCase() + t.slice(1))?.classList.remove('active');
    });
    document.getElementById('tab' + tab.charAt(0).toUpperCase() + tab.slice(1))?.classList.add('active');
    document.getElementById('panel' + tab.charAt(0).toUpperCase() + tab.slice(1))?.classList.add('active');

    ['loginError','registerError','resetError','resetSuccess'].forEach(id => {
      const el = document.getElementById(id);
      if (el) { el.classList.remove('show'); el.textContent = ''; }
    });
  }

  function showError(id, msg) {
    const el = document.getElementById(id);
    if (el) { el.textContent = msg; el.classList.add('show'); }
  }

  function togglePassword(id) {
    const input = document.getElementById(id);
    const btn = input.parentElement.querySelector('.pw-toggle');
    input.type = input.type === 'password' ? 'text' : 'password';
    btn.textContent = input.type === 'password' ? '👁' : '🙈';
  }

  async function handleLogin() {
    console.log('[Anew] login clicked');
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    console.log('[Anew] email:', email);
    console.log('[Anew] sbClient:', sbClient ? 'initialized' : 'null');

    if (!email) { showError('loginError', 'Please enter your email address.'); return; }
    if (!password) { showError('loginError', 'Please enter your password.'); return; }
    if (password.length < 8) { showError('loginError', 'Password must be at least 8 characters.'); return; }
    if (!sbClient) { showError('loginError', 'Something went wrong. Please try again.'); return; }

    const btn = document.getElementById('loginBtn');
    btn.disabled = true;
    btn.textContent = '...';
    document.getElementById('loginError').classList.remove('show');

    try {
      const { data, error } = await sbClient.auth.signInWithPassword({ email, password });
      console.log('[Anew] login result — data:', data, 'error:', error);
      if (error) throw error;
      await redirectByStatus(data.session);
    } catch (e) {
      console.error('[Anew] login error:', e);
      const msg = e.message || '';
      let display;
      if (msg.includes('Invalid login credentials')) {
        display = 'Incorrect email or password. Please try again.';
      } else if (msg.includes('Email not confirmed')) {
        display = 'Please confirm your email address first.';
      } else {
        display = 'Something went wrong. Please try again.';
      }
      showError('loginError', display);
      btn.disabled = false;
      btn.textContent = 'Log in';
    }
  }

  async function handleRegister() {
    const email = document.getElementById('regEmail').value.trim();
    const password = document.getElementById('regPassword').value;
    const confirm = document.getElementById('regConfirm').value;

    if (!email) { showError('registerError', 'Please enter your email address.'); return; }
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailRegex.test(email)) { showError('registerError', 'Please enter a valid email address.'); return; }
    if (!password) { showError('registerError', 'Please enter your password.'); return; }
    if (password.length < 8) { showError('registerError', 'Password must be at least 8 characters.'); return; }
    if (password !== confirm) { showError('registerError', 'Passwords do not match.'); return; }
    if (!sbClient) { showError('registerError', 'Something went wrong. Please try again.'); return; }

    const btn = document.getElementById('registerBtn');
    btn.disabled = true;
    btn.textContent = '...';
    document.getElementById('registerError').classList.remove('show');

    try {
      const { error } = await sbClient.auth.signUp({
        email,
        password,
        options: { emailRedirectTo: window.location.origin + '/app.html' }
      });
      if (error) throw error;

      document.getElementById('regFormFields').style.display = 'none';
      document.getElementById('confirmState').style.display = 'block';
    } catch (e) {
      showError('registerError', e.message || 'Something went wrong. Please try again.');
      btn.disabled = false;
      btn.textContent = 'Create account';
    }
  }

  async function handleReset() {
    if (!sbClient) { showError('resetError', 'Something went wrong. Please try again.'); return; }
    const email = document.getElementById('resetEmail').value.trim();
    if (!email) { showError('resetError', 'Please enter your email address.'); return; }

    const btn = document.getElementById('resetBtn');
    btn.disabled = true;
    btn.textContent = '...';
    document.getElementById('resetError').classList.remove('show');
    document.getElementById('resetSuccess').classList.remove('show');

    try {
      const { error } = await sbClient.auth.resetPasswordForEmail(email, {
        redirectTo: window.location.origin + '/app.html'
      });
      if (error) throw error;
      document.getElementById('resetSuccess').classList.add('show');
    } catch (e) {
      showError('resetError', e.message || 'Something went wrong. Please try again.');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Send reset email';
    }
  }

  // Enter key support
  document.addEventListener('keydown', (e) => {
    if (e.key !== 'Enter') return;
    const panel = document.querySelector('.auth-panel.active');
    if (!panel) return;
    if (panel.id === 'panelLogin') handleLogin();
    else if (panel.id === 'panelRegister') handleRegister();
    else if (panel.id === 'panelReset') handleReset();
  });

  initSupabase();
</script>
</body>
</html>
