<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anew — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --warm-white: #FAF6F1;
    --clay: #B8704E;
    --clay-light: #D4906E;
    --clay-dark: #8C4E32;
    --charcoal: #1C1614;
    --charcoal-soft: #5C4D45;
    --stone: #8A7870;
    --blush: #EDD4C6;
    --blush-deep: #DBBAA6;
    --section-alt: #F5EFE8;
    --sage: #5E8A60;
  }

  html, body {
    min-height: 100dvh;
    font-family: 'DM Sans', sans-serif;
    background: var(--warm-white);
    color: var(--charcoal);
  }

  .auth-wrap {
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 24px 48px;
  }

  .auth-logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    font-weight: 400;
    letter-spacing: 0.1em;
    color: var(--charcoal);
    margin-bottom: 40px;
  }

  .auth-card {
    background: white;
    border-radius: 16px;
    padding: 36px 32px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 8px 40px rgba(28,22,20,0.08);
  }

  /* Tabs */
  .auth-tabs {
    display: flex;
    border-bottom: 1px solid var(--blush-deep);
    margin-bottom: 28px;
    gap: 0;
  }

  .auth-tab {
    flex: 1;
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    padding: 10px 0 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--stone);
    cursor: pointer;
    transition: color 0.2s ease, border-color 0.2s ease;
  }

  .auth-tab.active {
    color: var(--charcoal);
    border-bottom-color: var(--clay);
  }

  /* Panels */
  .auth-panel { display: none; }
  .auth-panel.active { display: block; }

  /* Form elements */
  .form-group {
    margin-bottom: 16px;
  }

  .form-label {
    display: block;
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--stone);
    margin-bottom: 6px;
  }

  .form-input {
    width: 100%;
    border: 1.5px solid var(--blush-deep);
    border-radius: 8px;
    padding: 12px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    color: var(--charcoal);
    background: white;
    outline: none;
    transition: border-color 0.2s ease;
    min-height: 48px;
  }

  .form-input:focus { border-color: var(--clay); }
  .form-input::placeholder { color: var(--stone); }

  .btn-auth {
    width: 100%;
    background: var(--clay);
    color: white;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    padding: 16px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    transition: background 0.2s ease;
    min-height: 52px;
    margin-top: 8px;
  }

  .btn-auth:hover { background: var(--clay-dark); }
  .btn-auth:disabled { background: var(--blush-deep); cursor: not-allowed; }

  .form-link {
    display: block;
    text-align: right;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    color: var(--stone);
    text-decoration: underline;
    text-underline-offset: 3px;
    background: none;
    border: none;
    cursor: pointer;
    padding: 0;
    margin-top: 4px;
  }

  .form-link:hover { color: var(--charcoal-soft); }

  .form-error {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: var(--clay-dark);
    margin-top: 12px;
    padding: 10px 12px;
    background: rgba(184,112,78,0.08);
    border-radius: 6px;
    display: none;
  }

  .form-error.show { display: block; }

  .form-success {
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--sage);
    margin-top: 12px;
    padding: 12px;
    background: rgba(94,138,96,0.08);
    border-radius: 6px;
    line-height: 1.5;
    display: none;
  }

  .form-success.show { display: block; }

  /* Email confirmation state */
  .confirm-state {
    text-align: center;
    padding: 8px 0;
  }

  .confirm-icon {
    font-size: 40px;
    margin-bottom: 16px;
  }

  .confirm-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 24px;
    font-weight: 400;
    color: var(--charcoal);
    margin-bottom: 12px;
  }

  .confirm-text {
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--charcoal-soft);
    line-height: 1.6;
  }

  /* Disclaimer */
  .auth-disclaimer {
    margin-top: 24px;
    text-align: center;
    max-width: 420px;
  }

  .auth-disclaimer p {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    color: var(--stone);
    line-height: 1.6;
    margin-bottom: 8px;
  }

  .auth-disclaimer-links {
    display: flex;
    justify-content: center;
    gap: 16px;
  }

  .auth-disclaimer-links a {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    color: var(--stone);
    text-decoration: underline;
    text-underline-offset: 2px;
  }

  .auth-disclaimer-links a:hover { color: var(--charcoal-soft); }

  @media (max-width: 480px) {
    .auth-card { padding: 28px 20px; }
  }
</style>
</head>
<body>

<div class="auth-wrap">
  <div class="auth-logo">Anew</div>

  <div class="auth-card" id="authCard">
    <!-- Tabs -->
    <div class="auth-tabs">
      <button class="auth-tab active" id="tabLogin" onclick="switchTab('login')">ログイン</button>
      <button class="auth-tab" id="tabRegister" onclick="switchTab('register')">新規登録</button>
    </div>

    <!-- Login panel -->
    <div class="auth-panel active" id="panelLogin">
      <div class="form-group">
        <label class="form-label" for="loginEmail">メールアドレス</label>
        <input class="form-input" type="email" id="loginEmail" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label" for="loginPassword">パスワード</label>
        <input class="form-input" type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password">
        <button class="form-link" onclick="switchTab('reset')">パスワードを忘れた方</button>
      </div>
      <button class="btn-auth" id="loginBtn" onclick="handleLogin()">ログイン</button>
      <div class="form-error" id="loginError"></div>
    </div>

    <!-- Register panel -->
    <div class="auth-panel" id="panelRegister">
      <div class="form-group">
        <label class="form-label" for="regEmail">メールアドレス</label>
        <input class="form-input" type="email" id="regEmail" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label" for="regPassword">パスワード（8文字以上）</label>
        <input class="form-input" type="password" id="regPassword" placeholder="••••••••" autocomplete="new-password">
      </div>
      <div class="form-group">
        <label class="form-label" for="regConfirm">パスワード確認</label>
        <input class="form-input" type="password" id="regConfirm" placeholder="••••••••" autocomplete="new-password">
      </div>
      <button class="btn-auth" id="registerBtn" onclick="handleRegister()">登録する</button>
      <div class="form-error" id="registerError"></div>

      <!-- Email sent confirmation (hidden initially) -->
      <div id="confirmState" style="display:none;" class="confirm-state">
        <div class="confirm-icon">✉️</div>
        <div class="confirm-title">確認メールを送りました</div>
        <p class="confirm-text">メールに記載のリンクをクリックして、アカウントを有効化してください。</p>
      </div>
    </div>

    <!-- Password reset panel -->
    <div class="auth-panel" id="panelReset">
      <div class="form-group">
        <label class="form-label" for="resetEmail">メールアドレス</label>
        <input class="form-input" type="email" id="resetEmail" placeholder="you@example.com" autocomplete="email">
      </div>
      <button class="btn-auth" id="resetBtn" onclick="handleReset()">リセットメールを送る</button>
      <div class="form-error" id="resetError"></div>
      <div class="form-success" id="resetSuccess">メールを確認してください。パスワードリセットのリンクをお送りしました。</div>
      <button class="form-link" style="text-align:center;margin-top:16px;display:block;" onclick="switchTab('login')">ログインに戻る</button>
    </div>
  </div>

  <div class="auth-disclaimer">
    <p>Anew is not a substitute for professional therapy or medical advice.</p>
    <div class="auth-disclaimer-links">
      <a href="/terms.html">Terms of Service</a>
      <a href="/privacy.html">Privacy Policy</a>
    </div>
  </div>
</div>

<script>
  let sbClient = null;

  async function initSupabase() {
    try {
      const res = await fetch('/api/config');
      if (!res.ok) return;
      const { supabaseUrl, supabaseAnonKey } = await res.json();
      if (!supabaseUrl || !supabaseAnonKey) return;
      sbClient = supabase.createClient(supabaseUrl, supabaseAnonKey);

      // Check existing session
      const { data: { session } } = await sbClient.auth.getSession();
      if (session) {
        await redirectByStatus(session);
      }

      // Listen for auth changes (e.g. email confirmation callback)
      sbClient.auth.onAuthStateChange(async (event, session) => {
        if (event === 'SIGNED_IN' && session) {
          await redirectByStatus(session);
        }
      });
    } catch (_) {}
  }

  async function redirectByStatus(session) {
    try {
      const { data } = await sbClient
        .from('users')
        .select('subscription_status')
        .eq('id', session.user.id)
        .single();

      const status = data?.subscription_status;
      if (status === 'trial' || status === 'active') {
        window.location.href = '/dashboard.html';
      } else {
        window.location.href = '/onboarding.html';
      }
    } catch (_) {
      window.location.href = '/onboarding.html';
    }
  }

  function switchTab(tab) {
    ['login', 'register', 'reset'].forEach(t => {
      document.getElementById('tab' + t.charAt(0).toUpperCase() + t.slice(1))?.classList.remove('active');
      document.getElementById('panel' + t.charAt(0).toUpperCase() + t.slice(1))?.classList.remove('active');
    });
    document.getElementById('tab' + tab.charAt(0).toUpperCase() + tab.slice(1))?.classList.add('active');
    document.getElementById('panel' + tab.charAt(0).toUpperCase() + tab.slice(1))?.classList.add('active');

    // Clear errors
    ['loginError','registerError','resetError','resetSuccess'].forEach(id => {
      const el = document.getElementById(id);
      if (el) { el.classList.remove('show'); el.textContent = ''; }
    });
  }

  function showError(id, msg) {
    const el = document.getElementById(id);
    if (el) { el.textContent = msg; el.classList.add('show'); }
  }

  function setLoading(btnId, loading) {
    const btn = document.getElementById(btnId);
    if (!btn) return;
    btn.disabled = loading;
    btn.textContent = loading ? '...' : btn.dataset.label;
  }

  async function handleLogin() {
    if (!sbClient) { showError('loginError', 'ページを再読み込みしてください。'); return; }
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    if (!email || !password) { showError('loginError', 'メールアドレスとパスワードを入力してください。'); return; }

    const btn = document.getElementById('loginBtn');
    btn.disabled = true;
    btn.textContent = '...';
    document.getElementById('loginError').classList.remove('show');

    try {
      const { data, error } = await sbClient.auth.signInWithPassword({ email, password });
      if (error) throw error;
      await redirectByStatus(data.session);
    } catch (e) {
      showError('loginError', e.message === 'Invalid login credentials'
        ? 'メールアドレスまたはパスワードが正しくありません。'
        : e.message || 'ログインに失敗しました。');
      btn.disabled = false;
      btn.textContent = 'ログイン';
    }
  }

  async function handleRegister() {
    if (!sbClient) { showError('registerError', 'ページを再読み込みしてください。'); return; }
    const email = document.getElementById('regEmail').value.trim();
    const password = document.getElementById('regPassword').value;
    const confirm = document.getElementById('regConfirm').value;

    if (!email || !password || !confirm) { showError('registerError', 'すべての項目を入力してください。'); return; }
    if (password.length < 8) { showError('registerError', 'パスワードは8文字以上にしてください。'); return; }
    if (password !== confirm) { showError('registerError', 'パスワードが一致しません。'); return; }

    const btn = document.getElementById('registerBtn');
    btn.disabled = true;
    btn.textContent = '...';
    document.getElementById('registerError').classList.remove('show');

    try {
      const { error } = await sbClient.auth.signUp({
        email,
        password,
        options: { emailRedirectTo: window.location.origin + '/app.html' }
      });
      if (error) throw error;

      // Show confirmation state
      document.getElementById('regEmail').style.display = 'none';
      document.getElementById('regPassword').style.display = 'none';
      document.getElementById('regConfirm').style.display = 'none';
      btn.style.display = 'none';
      document.querySelector('#panelRegister .form-group:nth-child(1) .form-label').style.display = 'none';
      document.querySelector('#panelRegister .form-group:nth-child(2) .form-label').style.display = 'none';
      document.querySelector('#panelRegister .form-group:nth-child(3) .form-label').style.display = 'none';
      document.getElementById('confirmState').style.display = 'block';
    } catch (e) {
      showError('registerError', e.message || '登録に失敗しました。');
      btn.disabled = false;
      btn.textContent = '登録する';
    }
  }

  async function handleReset() {
    if (!sbClient) { showError('resetError', 'ページを再読み込みしてください。'); return; }
    const email = document.getElementById('resetEmail').value.trim();
    if (!email) { showError('resetError', 'メールアドレスを入力してください。'); return; }

    const btn = document.getElementById('resetBtn');
    btn.disabled = true;
    btn.textContent = '...';
    document.getElementById('resetError').classList.remove('show');
    document.getElementById('resetSuccess').classList.remove('show');

    try {
      const { error } = await sbClient.auth.resetPasswordForEmail(email, {
        redirectTo: window.location.origin + '/app.html'
      });
      if (error) throw error;
      document.getElementById('resetSuccess').classList.add('show');
    } catch (e) {
      showError('resetError', e.message || 'メール送信に失敗しました。');
    } finally {
      btn.disabled = false;
      btn.textContent = 'リセットメールを送る';
    }
  }

  // Enter key support
  document.addEventListener('keydown', (e) => {
    if (e.key !== 'Enter') return;
    const panel = document.querySelector('.auth-panel.active');
    if (!panel) return;
    if (panel.id === 'panelLogin') handleLogin();
    else if (panel.id === 'panelRegister') handleRegister();
    else if (panel.id === 'panelReset') handleReset();
  });

  initSupabase();
</script>
</body>
</html>
